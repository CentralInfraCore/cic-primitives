why_invalid: >
  The aggregate slot mode value is 'optional' — this is not a valid value.
  Per D-005, the three valid modes are: sealed | defaulted | required.
  The index.yaml meta-schema enum constraint catches this.

expected_error: >
  jsonschema.ValidationError: 'optional' is not one of ['sealed', 'defaulted', 'required']

---
metadata:
  name: BadAggregate
  version: v0.1.dev
  description: Demonstration of an invalid slot mode
  owner: Gabor Zoltan Sinko
  tags:
    - aggregate
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive
  slots:
    identity:
      mode: required
      type: Identity
    config_surface:
      mode: optional        # INVALID — only sealed|defaulted|required are allowed
      type: ConfigSurface
