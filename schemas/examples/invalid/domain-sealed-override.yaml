why_invalid: >
  The DomainComposition overrides the lifecycle_surface slot, which is mode: sealed
  in the ManagedEntity aggregate. Per D-005, a sealed slot must not be modified in a derived type.
  compiler.py run_domain_compatibility_check() catches this since Phase 6.3.

expected_error: >
  compiler.py: sealed slot 'lifecycle_surface' must not be overridden

---
metadata:
  name: BadDomainComposition
  version: v0.0.dev
  description: Demonstration of overriding a sealed slot
  owner: Gabor Zoltan Sinko
  tags:
    - example
    - domain-composition
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: DomainComposition
  base:
    aggregate: ManagedEntity
    ref: schemas/aggregate/managed-entity.yaml

  identity:
    kind: BadEntity
    namespace: "cic:example"
    version: v0.1.dev
    base: "cic:core:ManagedEntity"

  config_surface:
    nodes:
      - name: param
        shape_type: scalar
        scalar_type: string
        role: config
        mandatory: true

  state_surface:
    source: example-adapter
    nodes:
      - name: status
        shape_type: scalar
        scalar_type: string
        role: state

  lifecycle_surface:            # INVALID — lifecycle_surface is sealed in ManagedEntity
    states: [on, off]
    initial: off
    transitions:
      off: [on]
      on: [off]

  binding_surface:
    addresses:
      - schema_path: "/cic-example:entities/entity={id}"
        api_path: "/restconf/data/cic-example:entities/entity={id}"
        logical_id: "cic:example:{id}"
