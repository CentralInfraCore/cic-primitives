why_invalid: >
  The metadata block is missing the required 'owner' and 'validatedBy' fields.
  According to the index.yaml meta-schema, metadata.owner and metadata.validatedBy
  are required. compiler.py validate catches this.

expected_error: >
  jsonschema.ValidationError: 'owner' is a required property
  jsonschema.ValidationError: 'validatedBy' is a required property

---
metadata:
  name: BrokenAtom
  version: v0.1.dev
  description: Demonstration of missing required metadata fields
  tags:
    - atomic

spec:
  kind: AtomicPrimitive
  fields:
    - name: value
      type: scalar
