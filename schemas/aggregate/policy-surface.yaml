---
metadata:
  name: PolicySurface
  version: v0.0.dev
  description: >
    Aggregate of object-level default access control rules.
    The Access atom's field-level wrapper uses this as the default when inherit: true.
    If a ManagedEntity has no PolicySurface, the runtime makes every field accessible
    (backward compatible open default).
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - aggregate
    - policy
    - security
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive

  atomic_dependencies:
    - atomic: Access
      ref: schemas/atomic/access.yaml
      used_by: [default_access, default_modify, surface_rules]

  slots:
    default_access:
      mode: defaulted
      type: "CertPattern[]"
      atomic_ref: schemas/atomic/access.yaml
      default: open
      description: >
        Who may read any field on this object — unless the Access atom overrides
        at field level. `open` = anyone may read (default).

    default_modify:
      mode: defaulted
      type: "CertPattern[]"
      atomic_ref: schemas/atomic/access.yaml
      default: owner
      description: >
        Who may write any config field on this object — unless the Access atom overrides
        at field level. `owner` = the object's owner may write.

    surface_rules:
      mode: defaulted
      type: "SurfaceRule[]"
      default: empty
      description: >
        Surface-level rules — finer granularity than the whole-object default,
        coarser than field-level Access atom.
        E.g. different rules for config_surface vs state_surface.
        Structure: {surface: config_surface|state_surface|..., access: [...], modify: [...]}

    inherit_policy:
      mode: defaulted
      type: boolean
      default: true
      description: >
        If true: sub-objects inherit this PolicySurface.
        If false: sub-objects define their own PolicySurface.
        If 0: full reset — sub-object's PolicySurface is built from scratch.

  semantic_mapping:
    runtime:
      evaluation_order: >
        1. field-level Access atom (highest priority)
        2. surface_rules (surface-level override)
        3. default_access / default_modify (object-level default)
        4. inherited PolicySurface from parent object (if inherit_policy: true)
      miss_behavior: >
        If the object has no PolicySurface and none can be inherited from parent:
        all fields are accessible (open default) — backward compatible.
