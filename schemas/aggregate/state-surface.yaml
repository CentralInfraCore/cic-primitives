---
metadata:
  name: StateSurface
  version: v0.0.dev
  description: >
    A csak olvasható, aktuális állapot felülete egy ManagedEntity-n.
    Az adapter tölti fel — ez mutatja meg mi van ténylegesen a rendszerben.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - aggregate
    - state
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive

  atomic_dependencies:
    - atomic: Shape
      ref: schemas/atomic/shape.yaml
      used_by: [root, nodes]
    - atomic: Role
      ref: schemas/atomic/role.yaml
      used_by: [nodes]

  slots:
    root:
      mode: sealed
      type: Shape
      atomic_ref: schemas/atomic/shape.yaml
      shape_type: composite
      description: >
        A state fa gyökere — Shape(composite) típusú konténer, config false.
        Nem módosítható — struktúra egységes a teljes CIC-ben.

    nodes:
      mode: required
      type: "Shape[]"
      atomic_ref: schemas/atomic/shape.yaml
      role_constraint: [state, operational, derived, volatile]
      role_ref: schemas/atomic/role.yaml
      description: >
        Az observable mezők listája — Shape atomok, Role(state|operational|derived|volatile)
        megszorítással. Role(config) itt tiltott — state surface nem tartalmaz írható mezőt.
        Leszármazottban kötelezően specializálandó.

    freshness:
      mode: defaulted
      type: object
      default:
        ttl: 60s
        strategy: polling
      description: >
        Mennyi ideig érvényes az observed state és hogyan frissül.
        Stratégiák: polling | streaming | event-driven | push.
        Nem atomic primitive — adapter-szintű konfiguráció.

    source:
      mode: required
      type: TBD
      description: >
        Ki tölti fel ezt a state surface-t. Adapter referencia — kötelező megadni.
        Például: kubernetes-adapter, snmp-adapter, mock-adapter.
        Jövőbeli atomic: AdapterRef (BindingSurface scope-ban definiálandó).

  semantic_mapping:
    yang:
      construct: container
      name: state
      flag: "config false"
      note: minden child node config false — nem írható NETCONF/RESTCONF-on keresztül
    api:
      methods: [GET]
      path: "/{resource}/state"
      note: csak olvasható — PUT/PATCH/DELETE nem engedélyezett
    runtime:
      role: observed-state-store
      note: az adapter írja, a reconciler olvassa a drift számításhoz
