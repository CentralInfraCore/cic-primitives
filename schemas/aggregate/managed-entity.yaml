---
metadata:
  name: ManagedEntity
  version: v0.0.dev
  description: >
    A CIC alap kompozíciós egysége — minden domain objektum ebből specializálódik.
    Nem önálló objektum: ez a szemantikai contract amelyre switch interface, kubernetes pod,
    database, service és bármi más ráül. Az objektum mindig következmény, soha nem kiindulópont.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - aggregate
    - core
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive

  atomic_dependencies:
    - atomic: Identity
      ref: schemas/atomic/identity.yaml
      used_by: [identity]
    - atomic: Address
      ref: schemas/atomic/address.yaml
      used_by: [binding_surface]
    - atomic: Event
      ref: schemas/atomic/event.yaml
      used_by: [notification_surface]

  aggregate_dependencies:
    - aggregate: ConfigSurface
      ref: schemas/aggregate/config-surface.yaml
      used_by: [config_surface]
    - aggregate: StateSurface
      ref: schemas/aggregate/state-surface.yaml
      used_by: [state_surface]
    - aggregate: OperationSurface
      ref: schemas/aggregate/operation-surface.yaml
      used_by: [operation_surface]

  slots:
    identity:
      mode: required
      type: Identity
      atomic_ref: schemas/atomic/identity.yaml
      description: >
        Típusazonosság — Identity atom. Meghatározza mi ez az entitás a CIC-ben.
        Komponensek: kind, namespace, version, base (örökíthető Identity chain).

    config_surface:
      mode: required
      type: ConfigSurface
      aggregate_ref: schemas/aggregate/config-surface.yaml
      description: >
        Az írható, kívánt állapot felülete. Kötelező — minden ManagedEntity-nek
        van konfigurálható állapota.

    state_surface:
      mode: required
      type: StateSurface
      aggregate_ref: schemas/aggregate/state-surface.yaml
      description: >
        A csak olvasható, aktuális állapot felülete. Kötelező — minden ManagedEntity-nek
        van lekérdezhető aktuális állapota.

    operation_surface:
      mode: defaulted
      type: OperationSurface
      aggregate_ref: schemas/aggregate/operation-surface.yaml
      default: empty
      description: >
        A végrehajtható műveletek felülete. Lehet üres — nem minden entitásnak vannak
        explicit műveletei (pl. egy egyszerű config node-nak nincs restart-ja).

    notification_surface:
      mode: defaulted
      type: "Event[]"
      atomic_ref: schemas/atomic/event.yaml
      default: empty
      description: >
        Az aszinkron jelzések felülete — Event atomok listája.
        Lehet üres. Jövőbeli NotificationSurface aggregate fogja köré burkolni
        a subscription és routing logikát.

    capability_surface:
      mode: defaulted
      type: TBD
      default: inherit
      description: >
        Mit tud ez az entitás — feature flags, supported operations, protocol versions.
        Jövőbeli CapabilitySurface aggregate (nem része az első körnek).

    lifecycle_surface:
      mode: sealed
      type: object
      states: [create, active, degraded, terminating, terminated]
      transitions:
        create: [active]
        active: [degraded, terminating]
        degraded: [active, terminating]
        terminating: [terminated]
      description: >
        Lifecycle állapotgép — minden ManagedEntity-nek van életciklusa, nem elhagyható.
        Jövőbeli LifecycleSurface aggregate fogja formálisan definiálni.

    binding_surface:
      mode: required
      type: "Address[]"
      atomic_ref: schemas/atomic/address.yaml
      description: >
        Legalább egy Address atom kötelező — hogyan érhető el ez az entitás.
        Address rétegek: schema_path, api_path, logical_id.
        Jövőbeli BindingSurface aggregate köré burkolja az adapter referenciát is.

  semantic_mapping:
    yang:
      construct: container
      note: >
        A ManagedEntity egy YANG container-ré fordul. Benne:
        config_surface → container config { ... }
        state_surface  → container state { config false; ... }
        operation_surface → rpc/action definíciók
        notification_surface → notification definíciók
    api:
      base_path: "/{resource-type}/{resource-id}"
      endpoints:
        - path: "/config"
          methods: [GET, PUT, PATCH]
        - path: "/state"
          methods: [GET]
        - path: "/operations/{name}"
          methods: [POST]
      note: RESTCONF resource — collection + instance pattern
    runtime:
      role: reconcile-loop-entry
      note: >
        A reconciler minden ManagedEntity-re: observe state_surface →
        compare config_surface → ha drift → execute operation vagy direkt apply.
