---
metadata:
  name: ManagedEntity
  version: v0.0.dev
  description: >
    The base compositional unit of CIC — every domain object specializes from this.
    Not a standalone object: it is the semantic contract on which switch interfaces, kubernetes pods,
    databases, services, and anything else are built. The object is always a consequence, never a starting point.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - aggregate
    - core
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive

  atomic_dependencies:
    - atomic: Identity
      ref: schemas/atomic/identity.yaml
      used_by: [identity]
    - atomic: Address
      ref: schemas/atomic/address.yaml
      used_by: [binding_surface]
    - atomic: Event
      ref: schemas/atomic/event.yaml
      used_by: [notification_surface]
    - atomic: Access
      ref: schemas/atomic/access.yaml
      used_by: [policy_surface, implicit on every field value]

  aggregate_dependencies:
    - aggregate: ConfigSurface
      ref: schemas/aggregate/config-surface.yaml
      used_by: [config_surface]
    - aggregate: StateSurface
      ref: schemas/aggregate/state-surface.yaml
      used_by: [state_surface]
    - aggregate: OperationSurface
      ref: schemas/aggregate/operation-surface.yaml
      used_by: [operation_surface]
    - aggregate: PolicySurface
      ref: schemas/aggregate/policy-surface.yaml
      used_by: [policy_surface]

  slots:
    identity:
      mode: required
      type: Identity
      atomic_ref: schemas/atomic/identity.yaml
      description: >
        Type identity — Identity atom. Defines what this entity is within CIC.
        Components: kind, namespace, version, base (inheritable Identity chain).

    config_surface:
      mode: required
      type: ConfigSurface
      aggregate_ref: schemas/aggregate/config-surface.yaml
      description: >
        The writable desired-state surface. Required — every ManagedEntity
        has a configurable state.

    state_surface:
      mode: required
      type: StateSurface
      aggregate_ref: schemas/aggregate/state-surface.yaml
      description: >
        The read-only observed-state surface. Required — every ManagedEntity
        has a queryable current state.

    operation_surface:
      mode: defaulted
      type: OperationSurface
      aggregate_ref: schemas/aggregate/operation-surface.yaml
      default: empty
      description: >
        The executable operations surface. May be empty — not every entity has
        explicit operations (e.g. a simple config node has no restart).

    notification_surface:
      mode: defaulted
      type: "Event[]"
      status: placeholder
      blocked_by: NotificationSurface aggregate (no model yet — notification routing prerequisite)
      atomic_ref: schemas/atomic/event.yaml
      default: empty
      description: >
        The asynchronous notifications surface — list of Event atoms.
        May be empty. Formal NotificationSurface aggregate follows the notification routing model.

    policy_surface:
      mode: defaulted
      type: PolicySurface
      aggregate_ref: schemas/aggregate/policy-surface.yaml
      default: open
      description: >
        Object-level default access control rules.
        The Access atom's field-level wrapper uses this as the default when inherit: true.
        If missing: all fields are accessible (open default — backward compatible).
        Evaluation order: field Access → surface_rules → default_access/modify → inherited.

    capability_surface:
      mode: defaulted
      type: TBD
      status: placeholder
      blocked_by: CapabilitySurface aggregate (no model yet — Relay capability declaration system prerequisite)
      default: inherit
      description: >
        What this entity can do — feature flags, supported operations, protocol versions.
        Formal CapabilitySurface aggregate follows the Relay capability model.

    lifecycle_surface:
      mode: sealed
      type: TBD
      status: placeholder
      blocked_by: LifecycleSurface aggregate (no model yet — Relay execution model prerequisite)
      states: [create, active, degraded, terminating, terminated]
      transitions:
        create: [active]
        active: [degraded, terminating]
        degraded: [active, terminating]
        terminating: [terminated]
      description: >
        Lifecycle state machine — every ManagedEntity has a lifecycle, non-optional.
        Formal LifecycleSurface aggregate follows the Relay execution model.

    binding_surface:
      mode: required
      type: "Address[]"
      atomic_ref: schemas/atomic/address.yaml
      description: >
        At least one Address atom is required — how this entity is reachable.
        Address layers: schema_path, api_path, logical_id.
        A future BindingSurface aggregate will also wrap the adapter reference.

  semantic_mapping:
    yang:
      construct: container
      note: >
        ManagedEntity maps to a YANG container. Inside:
        config_surface → container config { ... }
        state_surface  → container state { config false; ... }
        operation_surface → rpc/action definitions
        notification_surface → notification definitions
    api:
      base_path: "/{resource-type}/{resource-id}"
      endpoints:
        - path: "/config"
          methods: [GET, PUT, PATCH]
        - path: "/state"
          methods: [GET]
        - path: "/operations/{name}"
          methods: [POST]
      note: RESTCONF resource — collection + instance pattern
    runtime:
      role: reconcile-loop-entry
      note: >
        For every ManagedEntity, the reconciler: observe state_surface →
        compare config_surface → if drift → execute operation or direct apply.
