---
metadata:
  name: ConfigSurface
  version: v0.0.dev
  description: >
    Az írható, kívánt állapot felülete egy ManagedEntity-n.
    Minden config változás ezen a felületen keresztül érkezik — ez a desired state konténere.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - aggregate
    - config
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive

  atomic_dependencies:
    - atomic: Shape
      ref: schemas/atomic/shape.yaml
      used_by: [nodes]
    - atomic: Contract
      ref: schemas/atomic/contract.yaml
      used_by: [validation]

  slots:
    root:
      mode: sealed
      type: Shape
      atomic_ref: schemas/atomic/shape.yaml
      shape_type: composite
      description: >
        A config fa gyökere — Shape(composite) típusú konténer.
        Nem módosítható leszármazottban, struktúra egységes a teljes CIC-ben.

    nodes:
      mode: required
      type: "Shape[]"
      atomic_ref: schemas/atomic/shape.yaml
      role_constraint: config
      role_ref: schemas/atomic/role.yaml
      description: >
        A konkrét config mezők listája — Shape atomok, Role(config) megszorítással.
        Minden node írható desired state mező. Leszármazottban kötelezően specializálandó.

    validation:
      mode: defaulted
      type: "Contract[]"
      atomic_ref: schemas/atomic/contract.yaml
      default: []
      description: >
        Kényszerfeltételek listája amelyek a config alkalmazása előtt ellenőrizendők.
        Contract típusok: range, pattern, must, when, enum, mandatory, unique.

    access:
      mode: defaulted
      type: TBD
      default: inherit
      description: >
        Írási policy referencia — ki módosíthatja ezt a config surface-t.
        Alapértelmezés szerint az entitás szülőjétől örökli.
        Jövőbeli PolicyRef aggregate — az Access atom (8. atom) alapján.

  semantic_mapping:
    yang:
      construct: container
      name: config
      flag: "config true"
      note: minden leaf/container child config true-ként jelenik meg
    api:
      methods: [PUT, PATCH]
      path: "/{resource}/config"
      note: teljes csere PUT, részleges módosítás PATCH
    runtime:
      role: desired-state-store
      note: ez az az állapot amelyre a reconciler törekszik
