---
metadata:
  name: ConfigSurface
  version: v0.0.dev
  description: >
    The writable desired-state surface of a ManagedEntity.
    All configuration changes arrive through this surface — it is the desired state container.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - aggregate
    - config
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive

  atomic_dependencies:
    - atomic: Shape
      ref: schemas/atomic/shape.yaml
      used_by: [nodes]
    - atomic: Contract
      ref: schemas/atomic/contract.yaml
      used_by: [validation]

  slots:
    root:
      mode: sealed
      type: Shape
      atomic_ref: schemas/atomic/shape.yaml
      shape_type: composite
      description: >
        Root of the config tree — Shape(composite) container.
        Not overridable in derived types; structure is uniform across the entire CIC.

    nodes:
      mode: required
      type: "Shape[]"
      atomic_ref: schemas/atomic/shape.yaml
      role_constraint: config
      role_ref: schemas/atomic/role.yaml
      description: >
        The concrete config fields — Shape atoms with Role(config) constraint.
        Every node is a writable desired-state field. Must be specialised in derived types.

    validation:
      mode: defaulted
      type: "Contract[]"
      atomic_ref: schemas/atomic/contract.yaml
      default: []
      description: >
        Constraints verified before the configuration is applied.
        Contract types: range, pattern, must, when, enum, mandatory, unique.

    access:
      mode: defaulted
      type: TBD
      default: inherit
      description: >
        Write policy reference — who may modify this config surface.
        Defaults to inherited from the entity's parent.
        Future: PolicyRef aggregate based on the Access atom (atom 8).

  semantic_mapping:
    yang:
      construct: container
      name: config
      flag: "config true"
      note: every leaf/container child appears as config true
    api:
      methods: [PUT, PATCH]
      path: "/{resource}/config"
      note: full replacement via PUT, partial modification via PATCH
    runtime:
      role: desired-state-store
      note: this is the state the reconciler converges toward
