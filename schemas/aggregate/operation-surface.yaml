---
metadata:
  name: OperationSurface
  version: v0.0.dev
  description: >
    The executable operations surface of a ManagedEntity.
    Covers rpcs, actions, and lifecycle operations.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - aggregate
    - operation
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AggregatePrimitive

  atomic_dependencies:
    - atomic: Behavior
      ref: schemas/atomic/behavior.yaml
      used_by: [operations]

  slots:
    operations:
      mode: required
      type: "Behavior[]"
      atomic_ref: schemas/atomic/behavior.yaml
      description: >
        The list of executable operations — Behavior atoms.
        Must be specialised in derived types.
        Behavior types: rpc (entity-independent) | action (entity-bound) | operation (lifecycle).

    idempotency:
      mode: defaulted
      type: boolean
      default: false
      description: >
        Default idempotency flag for all operations in the operations slot.
        Overridable per operation in the Behavior atom.

    timeout:
      mode: defaulted
      type: duration
      default: 30s
      description: >
        Default timeout for all operations in the operations slot.
        Overridable per operation in the Behavior atom.

    audit:
      mode: sealed
      type: boolean
      value: true
      description: >
        Every operation execution is logged. Cannot be disabled.
        A fundamental requirement of the CIC management loop — auditability.

  semantic_mapping:
    yang:
      constructs: [rpc, action]
      note: >
        rpc = top-level, entity-independent (e.g. validate-config).
        action = entity-bound, sibling of config/state container (e.g. restart).
    api:
      methods: [POST]
      path: "/{resource}/operations/{operation-name}"
      note: every operation is a POST endpoint — no idempotent HTTP verb mapping
    runtime:
      role: operation-dispatcher
      note: the runtime invokes the adapter's corresponding handler
