---
metadata:
  name: Shape
  version: v0.0.dev
  description: >
    Atomic primitive describing data structure — what fields exist and what types they have.
    Shape defines how a config or state node looks from a data-structure perspective.
    All ConfigSurface.nodes and StateSurface.nodes are composed of Shape atoms.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - atomic
    - shape
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AtomicPrimitive

  type_system:
    description: >
      The possible types for a Shape. Every field has exactly one type.
    values:
      scalar:
        description: Simple value — string, integer, boolean, number
        subtypes: [string, integer, boolean, number, bytes]
      composite:
        description: Nested structure — a set of named fields (YANG container)
        note: recursive — composite may contain composite
      collection:
        description: Ordered list or associative set of elements (YANG list / leaf-list)
        variants:
          list: ordered or keyed elements (YANG list with key)
          set: unkeyed elements (YANG leaf-list)
      reference:
        description: Pointer to another node (YANG leafref)
        note: the target node must exist in the schema
        subtypes:
          leafref: intra-schema reference — target lives in the same schema
          cic-reference: >
            Cross-domain CIC object reference — points to the logical_id of another domain entity.
            Format: cic:{domain}:{backend}:{provider}:{location}:{id}.
            The reference_target field identifies the target Kind.
      choice:
        description: Mutually exclusive alternatives — exactly one active (YANG choice/case)

  fields:
    description: Structure of a Shape field descriptor
    properties:
      name:
        type: string
        description: Field name — CamelCase or snake_case, consistent within the namespace
      type:
        type: string
        description: Field type, one of the type_system values
      optional:
        type: boolean
        default: false
        description: If true, the field may be absent from an instance
      nullable:
        type: boolean
        default: false
        description: If true, the field value may be null
      default:
        type: any
        description: Default value when the field is absent and optional is true
      description:
        type: string
        description: Field semantics — what it means and what it is for
      semantic_type:
        type: string
        optional: true
        description: >
          Semantic type annotation — refines the meaning of scalar_type: string.
          cic-reference: the field value is the logical_id of a CIC managed entity.
          Must be used together with the reference_target field.
      reference_target:
        type: string
        optional: true
        description: >
          The target CIC Kind — only meaningful when semantic_type: cic-reference.
          Format: "cic:{namespace}:{Kind}" (e.g. "cic:compute:ComputeResource").
          The Relay uses this to resolve and validate the reference.

  semantic_mapping:
    yang:
      scalar: leaf
      composite: container
      collection.list: list (with key)
      collection.set: leaf-list
      reference: leafref
      choice: choice + case
    api:
      note: Shape → OpenAPI schema properties / JSON Schema
    runtime:
      note: Shape → Go struct field / Python dataclass field
