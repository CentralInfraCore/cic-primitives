---
metadata:
  name: Contract
  version: v0.0.dev
  description: >
    Atomic primitive describing a constraint — what conditions must hold for a node's
    value or activation. Contract fills the ConfigSurface.validation slot,
    but may be attached to any Shape field.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - atomic
    - contract
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AtomicPrimitive

  types:
    range:
      description: Numeric value bound — minimum, maximum, or both
      yang_mapping: range statement in type
      example: "range: 1..65535"

    pattern:
      description: Regular expression — string format validation
      yang_mapping: pattern statement in type
      example: "pattern: ^[a-z][a-z0-9-]*$"

    must:
      description: >
        Logical constraint as XPath/JPath expression — must be true
        before the configuration is applied. May express cross-node relationships.
      yang_mapping: must statement
      example: "must: count(../interface) > 0"

    when:
      description: >
        Conditional activation — the node is valid/active only when the expression is true.
        When false, the node is ignored (as if it did not exist).
      yang_mapping: when statement
      example: "when: ../mode = 'layer3'"

    enum:
      description: Enumerated value set — only these values are valid
      yang_mapping: enumeration type
      example: "enum: [up, down, testing, unknown]"

    mandatory:
      description: >
        The node must be present — cannot be omitted, cannot be null.
        Stronger than optional: false because it is enforced at validation time.
      yang_mapping: mandatory true
      example: "mandatory: true"

    unique:
      description: >
        Intra-list uniqueness — the specified field combination must be unique
        across all list instances.
      yang_mapping: unique statement in list
      example: "unique: ip-address port"

  fields:
    description: Required and optional fields of a Contract definition
    properties:
      type:
        type: string
        enum: [range, pattern, must, when, enum, mandatory, unique]
        description: Constraint type (see types above)
      expression:
        type: string
        description: >
          The concrete constraint content — format varies by type.
          range: "min..max" | pattern: regex | must/when: XPath | enum: value list
      error_message:
        type: string
        description: >
          Message returned by the validator when the constraint is not satisfied.
          Should be human-friendly and actionable.
        optional: true
      description:
        type: string
        description: Why this constraint exists — the business/semantic rationale
        optional: true

  semantic_mapping:
    yang:
      range: "type integer { range '...'; }"
      pattern: "type string { pattern '...'; }"
      must: "must '...' { error-message '...'; }"
      when: "when '...';"
      enum: "type enumeration { enum up; enum down; }"
      mandatory: "mandatory true;"
      unique: "unique '...';"
    api:
      note: Contracts → OpenAPI enum/pattern/minimum/maximum/required constraints
    runtime:
      note: Contracts → pre-apply validation, error message returned via API
