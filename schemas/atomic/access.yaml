---
metadata:
  name: Access
  version: v0.0.dev
  description: >
    Atomic primitive wrapping every Shape value with access control.
    Two syntactically equivalent representations:
      key: value
      key: {value: value, access: [...], modify: [...], inherit: true, default_injection: null}
    The compiler normalizes the short form to the long form by filling in inherited rules.
    The runtime always evaluates the expanded form.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - atomic
    - access
    - security
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AtomicPrimitive

  fields:
    description: Internal structure of the Access atom
    properties:
      value:
        type: any
        description: >
          The actual data — its type is determined by the enclosing Shape.
          Short form: `key: value` is equivalent to `key: {value: value, ...}`.

      access:
        type: list<CertPattern>
        default: inherit
        description: >
          Who may read this value — CertPattern list, OR semantics.
          Empty list: nobody may read (only default_injection is visible).
          default = inherited from the parent object's PolicySurface rules.

      modify:
        type: list<CertPattern>
        default: inherit
        description: >
          Who may write this value — CertPattern list, OR semantics.
          Empty list: nobody may modify (read-only for all requestors).
          Adapter cert appears here for state/operational fields.

      inherit:
        type: boolean | 0
        default: true
        description: >
          Whether sub-objects inherit this rule for this field.
          true  = inherits (default)
          false = does not inherit; sub-object gets its own default rules
          0     = full reset — sub-object recomputes from its PolicySurface

      default_injection:
        type: any
        default: null
        description: >
          What the requestor receives when they lack access to the value.
          null    = field does not appear in the response (information hiding)
          <value> = injected default (e.g. 0, "", false) — uniform behaviour,
                    does not leak whether the field exists or what its value is

      conformance:
        type: enum
        values: [implemented, not_implemented, deprecated]
        default: implemented
        description: >
          Device-level implementation status — separate from permission-based
          visibility (D-012).

          implemented     (default) — field exists and is manageable on the device
          not_implemented — field does NOT exist on the device:
                            read: returns default_injection value (typically null)
                            write: HARD REJECT — "field not implemented on device X"
                            Silent acceptance is FORBIDDEN — the Relay rejects the write
          deprecated      — field exists but should be avoided:
                            read: value returned
                            write: WARNING + accepted

          Difference from missing permission:
            access: []      → PERMISSION DENIED (you cannot access it)
            not_implemented → HARD REJECT (the device cannot handle it)
          The requestor receives a distinct error — the two cases are not interchangeable.

  cert_pattern:
    description: >
      X.509 certificate-based identity pattern. Evaluated against the requestor's mTLS cert.
      Identity source: Subject DN, SAN, or custom X.509 extension —
      implementation detail; the cert PEM is the anchor.
    syntax:
      format: '"field=value" pairs, wildcard (*) supported'
      combinator: "list = OR — any matching pattern grants access"
    examples:
      - pattern: "O=acme-corp"
        meaning: any acme-corp certificate
      - pattern: "OU=operators,O=acme-corp"
        meaning: acme-corp operator group
      - pattern: "CN=*,O=partner-a"
        meaning: any user of partner-a
      - pattern: "OU=adapters,O=cic"
        meaning: CIC adapter service accounts (for state/operational fields)

  semantic_mapping:
    role_relation: >
      Access atom is orthogonal to Role atom.
      Role = what the field means (config/state/operational).
      Access = who may reach it.
      Combined: role: state + modify: [OU=adapters,O=cic] → adapter writes, user reads.
    compiler:
      short_form: "key: value → key: {value: value, ...inherited rules}"
      normalization: compiler fills in inherited PolicySurface rules
    runtime:
      evaluation: mTLS cert evaluated against the CertPattern list
      miss_behavior: default_injection returned when access is denied
      conformance_enforcement: >
        A write to a not_implemented field is NOT silently dropped by the Relay —
        it is rejected with an explicit "field not implemented on device X" error.
        Distinct from permission denied: the requestor knows the real reason.
    yang:
      note: >
        Analogous to YANG NACM (RFC 8341) — but at field level, not path level.
        During YANG derivation, Access metadata can be translated to NACM rules.
    api:
      note: >
        Fields the requestor cannot access are filtered from the RESTCONF response
        or returned with their default_injection value.
