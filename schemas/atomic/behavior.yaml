---
metadata:
  name: Behavior
  version: v0.0.dev
  description: >
    Atomic primitive describing an executable operation on an entity.
    Behavior defines what interactions are possible between the management plane and the entity
    beyond config/state read-write. OperationSurface.operations is composed of Behaviors.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - atomic
    - behavior
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AtomicPrimitive

  types:
    rpc:
      description: >
        Request/response — entity-independent, top-level operation.
        Not bound to any specific instance. E.g. validate-config, ping, dry-run.
      yang_mapping: top-level rpc statement
      api_mapping: "POST /operations/{name} (not resource-specific path)"
      runtime_mapping: global handler, no instance context
      properties:
        synchronous: true
        stateful: false

    action:
      description: >
        Entity-bound, state-modifying operation. Runs on the specific instance.
        E.g. restart, drain, flush-cache, force-reconcile.
      yang_mapping: action statement inside container/list
      api_mapping: "POST /{resource}/{id}/operations/{name}"
      runtime_mapping: instance-bound handler, has entity context
      properties:
        synchronous: varies
        stateful: true

    operation:
      description: >
        Higher-level lifecycle-bound operation — typically multi-step with
        orchestrated execution. E.g. migrate, scale, upgrade, backup/restore.
      yang_mapping: action statement — but handled by orchestration layer
      api_mapping: "POST /{resource}/{id}/operations/{name} → async job"
      runtime_mapping: workflow engine / long-running job
      properties:
        synchronous: false
        stateful: true
        returns: job-reference

  fields:
    description: Required and optional fields of a Behavior definition
    properties:
      name:
        type: string
        description: Operation name — verb form recommended (restart, drain, validate)
      type:
        type: string
        enum: [rpc, action, operation]
        description: Behavior type (see types above)
      input:
        type: reference
        description: >
          Input parameter schema — Shape reference or inline Shape.
          May be empty if the operation takes no parameters.
        optional: true
      output:
        type: reference
        description: >
          Output structure schema — Shape reference or inline Shape.
          May be empty if the operation returns no data.
        optional: true
      idempotent:
        type: boolean
        default: false
        description: >
          If true, executing the operation multiple times produces the same result.
          Affects retry logic and audit interpretation.
      description:
        type: string
        description: Purpose and side-effects of the operation

  semantic_mapping:
    yang:
      rpc: "rpc <name> { input { ... } output { ... } }"
      action: "action <name> { input { ... } output { ... } }"
    api:
      note: every Behavior is exposed as a POST endpoint — no idempotent HTTP verb mapping
    runtime:
      note: the dispatcher selects sync/async handler based on type
