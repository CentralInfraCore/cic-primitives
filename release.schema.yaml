---
type: object
title: "PrimitiveRelease Bundle Schema"
description: "Defines the structure of a signed release artifact produced by 'python tools/compiler.py release'. One file per release version under release/."
required:
  - kind
  - version
  - timestamp
  - validity
  - createdBy
  - specs
  - release

properties:
  kind:
    type: string
    const: PrimitiveRelease
    description: "Fixed discriminator — identifies this as a primitive release bundle."

  version:
    type: string
    description: "Semantic version of this release (e.g. '0.1.5')."
    pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)$"

  timestamp:
    type: string
    format: date-time
    description: "UTC timestamp of the release build (ISO 8601)."

  validity:
    type: object
    description: "Developer maintenance commitment window. Taken from commitment.yaml at release time."
    required:
      - from
      - until
    properties:
      from:
        type: string
        format: date
        description: "Start date of the maintenance commitment (ISO 8601 date)."
      until:
        type: string
        format: date
        description: "End date of the maintenance commitment (ISO 8601 date)."

  createdBy:
    type: object
    description: "Developer identity block. The certificate is bound inside the build_hash before signing."
    required:
      - name
      - email
      - certificate
    properties:
      name:
        type: string
        description: "Full name of the developer."
      email:
        type: string
        format: email
        description: "Contact email of the developer."
      certificate:
        type: string
        description: "PEM-encoded X.509 developer certificate (identity anchor, cryptographically bound to build_hash)."

  specs:
    type: array
    description: "Inline schema definitions. Each entry is one source schema file, inlined at release time."
    minItems: 1
    items:
      type: object
      required:
        - id
        - source_path
        - meta_hash
        - spec
      properties:
        id:
          type: string
          description: "Schema identifier — basename of the source file without extension."
        source_path:
          type: string
          description: "Relative path to the original source file in the repo (traceability)."
        meta_hash:
          type: string
          description: "SHA256 (base64) of the raw source file bytes at release time."
        spec:
          type: object
          description: "Full inline content of the schema file."

  release:
    type: object
    description: "Cryptographic provenance block. build_hash is computed over canonical JSON of {createdBy (developer), releasedBy (issuer), specs, validity} — both certificates are cryptographically bound before signing. Future: build_hash will become a Merkle tree root over CI artifact layers."
    required:
      - createdBy
      - build_hash
      - sign
    properties:
      createdBy:
        type: object
        description: "Release issuer identity. Certificate is bound inside build_hash before Vault signs."
        required:
          - name
          - email
          - certificate
        properties:
          name:
            type: string
            description: "Full name of the release issuer."
          email:
            type: string
            format: email
            description: "Contact email of the release issuer."
          certificate:
            type: string
            description: "PEM-encoded X.509 release issuer certificate (cryptographically bound to build_hash)."
      build_hash:
        type: string
        description: "SHA256 (base64) of canonical JSON of {createdBy (developer), releasedBy (issuer), specs, validity}. Tamper-proof seal over both identities and all schema content. Future: Merkle tree root."
      sign:
        type: string
        description: "Vault Transit ECDSA signature over build_hash (prehashed=true), verifiable with release.createdBy.certificate."

  cic_countersign:
    type: object
    description: "External CIC counter-signature over release.build_hash. Applied by CICSourceCA after the release artifact is built and signed by the issuer."
    required:
      - authority
      - signed_payload
      - sign
    properties:
      authority:
        type: object
        required:
          - name
          - certificate
          - root_certificate
        properties:
          name:
            type: string
            description: "Human-readable name of the signing authority (e.g. 'CIC Source CA')."
          certificate:
            type: string
            description: "PEM-encoded X.509 certificate of the signing authority (intermediate CA)."
          root_certificate:
            type: string
            description: "PEM-encoded X.509 root CA certificate (trust anchor)."
      signed_payload:
        type: string
        const: build_hash
        description: "Identifies what was signed — always 'build_hash', the cryptographic root of the release bundle."
      sign:
        type: string
        description: "ECDSA signature over release.build_hash (prehashed, DER base64, vault:v1: prefix), verifiable with authority.certificate."
