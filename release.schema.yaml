---
type: object
title: "PrimitiveRelease Bundle Schema"
description: "Defines the structure of a signed release artifact produced by 'python tools/compiler.py release'. One file per release version under release/."
required:
  - kind
  - version
  - timestamp
  - specs
  - release

properties:
  kind:
    type: string
    const: PrimitiveRelease
    description: "Fixed discriminator — identifies this as a primitive release bundle."

  version:
    type: string
    description: "Semantic version of this release (e.g. '0.1.3')."
    pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)$"

  timestamp:
    type: string
    format: date-time
    description: "UTC timestamp of the release build (ISO 8601)."

  specs:
    type: array
    description: "Inline schema definitions. Each entry is one source schema file, inlined at release time."
    minItems: 1
    items:
      type: object
      required:
        - id
        - source_path
        - meta_hash
        - spec
      properties:
        id:
          type: string
          description: "Schema identifier — basename of the source file without extension."
        source_path:
          type: string
          description: "Relative path to the original source file in the repo (traceability)."
        meta_hash:
          type: string
          description: "SHA256 (base64) of the raw source file bytes at release time. Verifiable against the source repo at the release tag."
        spec:
          type: object
          description: "Full inline content of the schema file, as loaded by yaml.safe_load."

  release:
    type: object
    description: "Cryptographic provenance block. content_hash is computed over canonical JSON of specs[]; sign is a single Vault Transit ECDSA signature."
    required:
      - content_hash
      - sign
      - cert
    properties:
      content_hash:
        type: string
        description: "SHA256 (base64) of canonical JSON (sorted keys, no whitespace) of the specs[] array. Tamper-proof seal over all inlined schemas."
      sign:
        type: string
        description: "Vault Transit ECDSA signature over content_hash (prehashed=true)."
      cert:
        type: string
        description: "PEM-encoded X.509 developer certificate used for signing (mTLS identity anchor)."
