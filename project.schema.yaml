---
type: object
title: "Project Definition Schema"
description: "Defines the structure for the project's main descriptor and configuration file (project.yaml)."
required:
  - project
  - compiler_settings

properties:
  project:
    type: object
    description: "General metadata about the repository."
    required:
      - name
      - description
      - license
      - owner
      - main_branch
    properties:
      name:
        type: string
        description: "The human-readable name of the repository."
      description:
        type: string
        description: "A one-sentence summary of the repository's purpose."
      version:
        type: [string, "null"]
        description: "The semantic version of the repository's codebase."
        pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\+([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?$"
      license:
        type: string
        description: "The SPDX identifier for the repository's license (e.g., 'MIT', 'CC-BY-NC-SA-4.0')."
      main_branch:
        type: string
        description: "The prefix used for release branches and tags (e.g., 'main' or 'schemas')."
      owner:
        type: string
        description: "The team or individual responsible for the repository."
      maintenance:
        type: object
        description: "Defines the maintenance status and support window for this version of the repository."
        properties:
          status:
            type: string
            description: "The current maintenance status."
            enum: ["active", "maintenance-only", "deprecated", "end-of-life"]
          supported_until:
            type: string
            description: "The date (YYYY-MM-DD) until which this version receives support or updates."
            format: date

      contacts:
        type: array
        description: "Points of contact for support or questions."
        items:
          type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              enum: ["email", "slack", "msteams"]
            value:
              type: string
      links:
        type: array
        description: "Important URLs related to the repository."
        items:
          type: object
          required: ["name", "url"]
          properties:
            name:
              type: string
            url:
              type: string

  compiler_settings:
    type: object
    description: "Configuration for the build and release tools."
    required:
      - meta_schemas_dir
      - source_dir
      - meta_schema_file
      - vault_key_name
    properties:
      meta_schemas_dir:
        type: string
      source_dir:
        type: string
      meta_schema_file:
        type: string
      primitive_schema_file:
        type: string
        description: "Path to the primitive meta-schema (schemas/index.yaml). Enables primitive YAML validation pass."
      vault_key_name:
        type: string

  x-cic:
    type: object
    description: "CIC-specific extension fields — repo type declaration and known limitations."
    properties:
      repo_type:
        type: string
        description: "Semantic repo type (primitive | schema | domain | adapter). Not yet enforced by compiler."
        enum: [primitive, schema, domain, adapter]
      known_limitations:
        type: array
        description: "Documented known limitations of this repo's current implementation."
        items:
          type: object
          required: [id, description]
          properties:
            id:
              type: string
            description:
              type: string

  release:
    type: object
    description: "Cryptographic provenance block — populated by the release pipeline, not hand-edited."
    properties:
      version:
        type: string
        description: "Semantic version of this release."
      timestamp:
        type: string
        format: date-time
        description: "UTC timestamp of the release build."
      repository_tree_hash:
        type: string
        description: "Reproducible SHA256 (base64) of the Git tree at release — source provenance."
      build_hash:
        type: string
        description: "Reproducible SHA256 (base64) of the build artifact. Currently equals repository_tree_hash (no separate build step — see x-cic.known_limitations)."
      sign:
        type: string
        description: "Vault Transit ECDSA signature over the release block content."
      cert:
        type: string
        description: "PEM-encoded X.509 developer certificate used for signing (mTLS identity anchor)."
    required:
      - version
      - timestamp
      - repository_tree_hash
      - build_hash
      - sign
      - cert