project:
  name: cic-primitives
  description: CIC meta-schema layer — atomic and aggregate primitives
  license: CC-BY-NC-SA-4.0
  main_branch: primitives/main
  owner: Gabor Zoltan Sinko
  maintenance:
    status: active
    supported_until: '2027-12-31'
  contacts:
    - type: email
      value: sinkog@centralinfracore.hu
  links:
    - name: repository
      url: https://github.com/CentralInfraCore/cic-primitives.git
compiler_settings:
  meta_schemas_dir: ./
  source_dir: schemas
  meta_schema_file: md.meta.schema.yaml
  primitive_schema_file: schemas/index.yaml
  vault_key_name: cic-my-sign-key
x-cic:
  repo_type: primitive
  known_limitations:
    - id: build_hash_equals_source_hash
      description: >
        build_hash == source_hash — no separate build step yet.
        Will diverge when pyang compile or code generation is introduced.
