version: 1
context: cic-primitives

# Statuses: pending | in_progress | done | blocked

entries:

  # ── Phase 1: Bootstrap ──────────────────────────────────────────────────────

  - task: "git-bootstrap"
    status: done
    priority: 1
    milestone: bootstrap
    prompt: |
      Initialize the cic-primitives repo following the base-repo pattern:
        1. git init
        2. git remote add base git@github.com:CentralInfraCore/base-repo.git
        3. git fetch base
        4. git merge base@0.5.0 --allow-unrelated-histories
      Verify that the tooling (tools/, mk/, Makefile, docker-compose.yml,
      .github/workflows/ci.yml, md.meta.schema.yaml, go.meta.schema.yaml) is present.
      If there are merge conflicts on existing files (.claude/, .mcp.json, primitive.txt,
      ai/, CLAUDE.md): keep the cic-primitives version, accept the base tooling.
    accept: ls tools/ && ls mk/ && ls Makefile

  - task: "dependency-yaml"
    status: done
    priority: 2
    milestone: bootstrap
    blocked_by: "git-bootstrap"
    prompt: |
      Create the dependency.yaml file at the repo root (D-007).
      This documents all remote-merge dependencies — must be updated after every merge.
      Content:
        schema_version: "1"
        dependencies:
          - name: base-repo
            source: github.com/CentralInfraCore/base-repo
            tag: base@0.5.0
            mode: remote-merge
            purpose: repository-contract
            imported_paths:
              - .github/
              - Makefile
              - mk/
              - tools/
      Rule: only pinned tags are allowed (not branches, not HEAD).
    accept: 'grep "tag: base@0.5.0" dependency.yaml'

  - task: "project-yaml"
    status: done
    priority: 3
    milestone: bootstrap
    prompt: |
      Create the project.yaml file following the CIC-Schemas project.yaml pattern.
      Required fields:
        metadata.name: cic-primitives
        metadata.description: CIC meta-schema layer — atomic and aggregate primitives
        metadata.license: CC-BY-NC-SA-4.0
        metadata.main_branch: main
        metadata.owner: Gabor Zoltan Sinko
        compiler_settings.repo_type: # omitted — compiler does not support it yet (D-006)
        x-cic.repo_type: primitive             # intent documented, tooling pending
        compiler_settings.component_name: cic-primitives
        compiler_settings.meta_schemas_dir: ./
        compiler_settings.source_dir: schemas
        compiler_settings.canonical_source_file: schemas/index.yaml
        compiler_settings.dependencies_dir: dependencies
        compiler_settings.release_dir: release
        compiler_settings.vault_key_name: cic-my-sign-key
    accept: make validate (dry run — structurally valid even without schema)

  - task: "schema-directory-structure"
    status: done
    priority: 4
    milestone: bootstrap
    prompt: |
      Create the schemas/ directory structure:
        schemas/
          atomic/     (empty, .gitkeep)
          aggregate/  (empty, .gitkeep)
          index.yaml  (meta-meta-schema placeholder)
        dependencies/ (empty, .gitkeep)
      schemas/index.yaml initially contains only a metadata block with an empty spec.
      validatedBy: template-schema v0.9.5_2025
      Copy dependencies/template-schema-v0.9.5_2025.yaml from CIC-Schemas.
    accept: ls schemas/atomic/ && ls schemas/aggregate/ && ls dependencies/

  # ── Phase 2: Aggregate skeletons (contract-first, without atomic refs) ───────
  # D-002: aggregate-first. Skeleton = slot definitions with sealed/defaulted/required
  # modes. Atomic type references are added in Phase 4.

  - task: "aggregate-config-surface-skeleton"
    status: done
    priority: 5
    milestone: aggregate-skeleton
    prompt: |
      Define the ConfigSurface aggregate skeleton schema: schemas/aggregate/config-surface.yaml
      Only the contract structure is needed — atomic type references not yet required (type: TBD).
      Slot structure (sealed/defaulted/required explicit, D-005):
        root:       sealed   — root of the config tree, not overridable
        nodes:      required — concrete config fields (type: TBD → Shape atoms in Phase 4)
        validation: defaulted — list of constraints (type: TBD → Contract atoms)
        access:     defaulted — write policy reference
      Semantic mapping (documented, not generated):
        YANG: /config container
        API:  PUT/PATCH methods
        Runtime: desired state store
    accept: grep -E "sealed|defaulted|required" schemas/aggregate/config-surface.yaml

  - task: "aggregate-state-surface-skeleton"
    status: done
    priority: 6
    milestone: aggregate-skeleton
    prompt: |
      Define the StateSurface aggregate skeleton schema: schemas/aggregate/state-surface.yaml
      Slot structure:
        root:       sealed   — root of the state tree
        nodes:      required — observable fields (type: TBD → Shape + Role(state) atoms)
        freshness:  defaulted — validity TTL / polling interval
        source:     required  — who populates it (adapter ref)
      Semantic mapping:
        YANG: /state container, config false
        API:  GET only
        Runtime: observed state store
    accept: grep -E "sealed|defaulted|required" schemas/aggregate/state-surface.yaml

  - task: "aggregate-operation-surface-skeleton"
    status: done
    priority: 7
    milestone: aggregate-skeleton
    prompt: |
      Define the OperationSurface aggregate skeleton schema: schemas/aggregate/operation-surface.yaml
      Slot structure:
        operations:  required — list of Behavior atoms (type: TBD)
        idempotency: defaulted — not idempotent by default
        timeout:     defaulted — 30s
        audit:       sealed   — every operation is logged, cannot be disabled
      Semantic mapping:
        YANG: rpc + action
        API:  POST /operations/{name}
        Runtime: operation dispatcher
    accept: grep -E "sealed|defaulted|required" schemas/aggregate/operation-surface.yaml

  - task: "aggregate-managed-entity-skeleton"
    status: done
    priority: 8
    milestone: aggregate-skeleton
    prompt: |
      Define the ManagedEntity aggregate skeleton schema: schemas/aggregate/managed-entity.yaml
      This is the most important aggregate — every domain object specializes from it.
      Components (mode explicit, type references in Phase 4):
        identity:             required — type identity
        config_surface:       required — (type: ConfigSurface)
        state_surface:        required — (type: StateSurface)
        operation_surface:    defaulted — may be empty
        notification_surface: defaulted — may be empty
        capability_surface:   defaulted
        lifecycle_surface:    sealed   — every entity has a lifecycle
        binding_surface:      required — at least one binding required
      Semantic mapping (documented at skeleton level):
        YAML → YANG container
        API  → RESTCONF resource
        Runtime → reconcile loop entry point
    accept: grep -E "sealed|defaulted|required" schemas/aggregate/managed-entity.yaml

  # ── Phase 3: Atomic layer ────────────────────────────────────────────────────

  - task: "atomic-shape"
    status: done
    priority: 9
    milestone: atomic
    prompt: |
      Define the Shape atomic primitive schema: schemas/atomic/shape.yaml
      Shape describes the data structure — what fields, what types.
      Metadata + spec structure following the template-schema pattern.
      The spec must describe:
        - fields: list (name, type, optional?, description)
        - type system: scalar | composite | collection | reference | choice
        - nullable, default value handling
      Closing criterion: how does this become a YAML schema node?
    accept: make validate

  - task: "atomic-role"
    status: done
    priority: 10
    milestone: atomic
    prompt: |
      Define the Role atomic primitive schema: schemas/atomic/role.yaml
      Role describes what a node means from a management perspective.
      Values: config | state | operational | key | reference | derived | volatile
      config = writable, desired state
      state = readable, observed state (config: false in YANG)
      key = list key
      reference = pointer to another node
    accept: make validate

  - task: "atomic-behavior"
    status: done
    priority: 11
    milestone: atomic
    prompt: |
      Define the Behavior atomic primitive schema: schemas/atomic/behavior.yaml
      Behavior describes what operations can be executed on an entity.
      Types: rpc | action | operation
      rpc = request/response, entity-independent
      action = entity-bound, modifies state
      operation = higher-level, lifecycle-bound (start/stop/drain/migrate)
      Every behavior has: name, input schema ref, output schema ref, idempotent flag
    accept: make validate

  - task: "atomic-contract"
    status: done
    priority: 12
    milestone: atomic
    prompt: |
      Define the Contract atomic primitive schema: schemas/atomic/contract.yaml
      Contract describes constraints.
      Types: range | pattern | must | when | enum | mandatory | unique
      must = XPath/JPath expression that must be true
      when = condition: node is only active if true
      Every contract has: type, expression, error_message
    accept: make validate

  - task: "atomic-address"
    status: done
    priority: 13
    milestone: atomic
    prompt: |
      Define the Address atomic primitive schema: schemas/atomic/address.yaml
      Address describes how an entity is reachable in the system.
      Layers: schema_path (internal tree position) | api_path (HTTP/RESTCONF URL) | logical_id (UUID/name)
      schema_path: /resources/resource/{id}/config
      api_path: /restconf/data/cic:resources/resource={id}
      Important: the address is not a property of the entity — it belongs to the binding
    accept: make validate

  - task: "atomic-identity"
    status: done
    priority: 14
    milestone: atomic
    prompt: |
      Define the Identity atomic primitive schema: schemas/atomic/identity.yaml
      Identity describes type identity — not instance identity.
      Components: kind (type name) | namespace (CIC namespace) | version | base (inheritable)
      Similar to YANG identity/identityref, but more general.
      A ManagedEntity Identity example:
        kind: NetworkInterface
        namespace: cic:network
        version: v1
        base: cic:ManagedEntity
    accept: make validate

  - task: "atomic-event"
    status: done
    priority: 15
    milestone: atomic
    prompt: |
      Define the Event atomic primitive schema: schemas/atomic/event.yaml
      Event describes asynchronous notifications.
      Fields: name | trigger (state-change | threshold | lifecycle | explicit) | payload schema ref
      state-change: a node value changed
      threshold: a measured value crossed a boundary
      lifecycle: create/update/delete occurred
      explicit: triggered by an action/rpc
    accept: make validate

  # ── Phase 4: Aggregate completion (wiring in atomic refs) ────────────────────

  - task: "aggregate-config-surface-complete"
    status: done
    priority: 16
    milestone: aggregate-complete
    blocked_by: "aggregate-config-surface-skeleton, atomic-shape, atomic-contract"
    prompt: |
      Complete the ConfigSurface skeleton with atomic type references.
      File: schemas/aggregate/config-surface.yaml
        nodes:      required → type: Shape[]
        validation: defaulted → type: Contract[]
      Closing criteria (all must be satisfied):
        - sealed/defaulted/required slots: explicit
        - atomic dependency list: present
        - YAML mapping: /config container → documented
        - YANG mapping: container + config true leaves → documented
        - API mapping: PUT/PATCH methods → documented
        - Runtime mapping: desired state store → documented
    accept: make validate

  - task: "aggregate-state-surface-complete"
    status: done
    priority: 17
    milestone: aggregate-complete
    blocked_by: "aggregate-state-surface-skeleton, atomic-shape, atomic-role"
    prompt: |
      Complete the StateSurface skeleton with atomic type references.
      File: schemas/aggregate/state-surface.yaml
        nodes: required → type: Shape[] + Role(state|operational|derived|volatile)
      Closing criteria:
        - sealed/defaulted/required: explicit
        - atomic dependency list: present
        - YANG: config false container → documented
        - API: GET only → documented
        - Runtime: observed state store → documented
    accept: make validate

  - task: "aggregate-operation-surface-complete"
    status: done
    priority: 18
    milestone: aggregate-complete
    blocked_by: "aggregate-operation-surface-skeleton, atomic-behavior"
    prompt: |
      Complete the OperationSurface skeleton with atomic type references.
      File: schemas/aggregate/operation-surface.yaml
        operations: required → type: Behavior[]
      Closing criteria:
        - sealed/defaulted/required: explicit
        - atomic dependency list: present
        - YANG: rpc + action → documented
        - API: POST /operations/{name} → documented
        - Runtime: operation dispatcher → documented
    accept: make validate

  - task: "aggregate-managed-entity-complete"
    status: done
    priority: 19
    milestone: aggregate-complete
    blocked_by: |
      aggregate-managed-entity-skeleton,
      aggregate-config-surface-complete,
      aggregate-state-surface-complete,
      aggregate-operation-surface-complete,
      atomic-identity
    prompt: |
      Complete the ManagedEntity skeleton with full composition.
      File: schemas/aggregate/managed-entity.yaml
      Closing criteria:
        - every component type is an explicit aggregate reference
        - sealed/defaulted/required: explicit
        - atomic dependency list: present
        - YAML: how does this become a YANG container? → documented
        - API: how does this become a RESTCONF resource? → documented
        - Runtime: how does this enter the reconcile loop? → documented
    accept: make validate

  # ── Phase 5: First domain example ───────────────────────────────────────────

  - task: "example-kubernetes-pod"
    status: done
    priority: 20
    milestone: example
    blocked_by: "aggregate-managed-entity-complete"
    prompt: |
      Create the first domain composition example: Kubernetes Pod as a ManagedEntity.
      File: schemas/examples/kubernetes-pod.yaml
      This is NOT a new primitive — it is a specialization of ManagedEntity:
        Identity: kind=KubernetesPod, namespace=cic:kubernetes, base=cic:ManagedEntity
        ConfigSurface.nodes: image, replicas, resources.requests, resources.limits, env
        StateSurface.nodes: phase, conditions[], containerStatuses[], podIP
        OperationSurface.operations: restart, drain, scale
        LifecycleSurface: create → running → terminating → terminated
      Show the complete derivation chain:
        primitive YAML → (planned) YANG module → RESTCONF path → runtime contract
    accept: schema is valid + chain is documented

  # ── Phase 6: Primitive YAML validation integration ──────────────────────────
  # D-008: compiler.py responsibility, not the primitive model
  # Order: index.yaml as primitive meta-schema → compiler integration → domain trial

  - task: "primitive-meta-schema"
    status: done
    priority: 21
    milestone: compiler-validation
    prompt: |
      Define `schemas/index.yaml` as the primitive meta-schema.
      This is the JSON Schema describing what a valid atomic / aggregate YAML file looks like.
      Minimum structure:
        - metadata block: name, version, description, owner, tags, validatedBy
        - spec block: kind (AtomicPrimitive | AggregatePrimitive | DomainComposition)
        - for atomic: spec.fields, spec.type_system
        - for aggregate: spec.slots (every slot must have mode: sealed|defaulted|required)
      This replaces the current placeholder index.yaml.
    accept: make validate

  - task: "compiler-primitive-validation"
    status: done
    priority: 22
    milestone: compiler-validation
    blocked_by: "primitive-meta-schema"
    prompt: |
      Wire primitive YAML validation into `tools/compiler.py`.
      Currently it only validates `*.meta.yaml` files against `md.meta.schema.yaml`.
      Required change: also validate `schemas/**/*.yaml` files against `schemas/index.yaml`.
      Closing criteria:
        - `make validate` validates all atomic + aggregate YAMLs
        - Invalid primitive YAML → validate fails, does not merely warn
    accept: make validate (atomic + aggregate YAMLs validated)

  - task: "domain-specialization-compatibility-check"
    status: done
    priority: 23
    milestone: compiler-validation
    blocked_by: "compiler-primitive-validation"
    prompt: |
      Write a semantic compatibility check in compiler.py for domain specializations.
      Is a DomainComposition (e.g. kubernetes-pod.yaml) compatible with the upstream
      ManagedEntity aggregate?
      Check:
        - no sealed slot is overridden
        - all required slots are filled
        - overriding a defaulted slot does not violate the type
        - merge strategy (replace | deep_merge | append | union) — D-008 open part
      This is the point where the first domain repo specialization can break — this must be covered.
    accept: make validate (kubernetes-pod.yaml compatibility verified)

  # ── Phase 8: Content-level permission system ────────────────────────────────
  # Trigger: discovered during cic-compute ComputeResource design — the same object
  # appears with different visibility and writability from user vs service vs adapter perspective.
  # This is not a schema-level difference — it is a question of field-level access and visibility.
  # For every node of every ManagedEntity: who can read it, who can write it, under what condition.

  - task: "policy-access-primitive-design"
    status: done
    priority: 25
    milestone: policy-surface
    prompt: |
      Design the primitive-level model for the content-level permission system.
      Principle: X.509 cert PEM is the identity anchor.
        - In mTLS the cert is already present in the request — no separate identity lookup needed
        - Extracting identity from the cert is an implementation detail
          (DN Subject, SAN, custom extension — doesn't matter, the cert PEM is the anchor)
        - The permission rule on the object references cert-based identity
      Inheritance model:
        - Sub-objects inherit the parent's permission context
        - They can modify it (restrict or expand)
        - inherit: 0 → full reset, parent rules do not apply
      Starting point: a ComputeResource cpu_cores field
        - the user writes it directly (self-managed compute)
        - a service writes it, the user can only read (SaaS-ordered compute)
        - the adapter manages it, the user cannot even see it (adapter-internal)
      Questions that must be answered:
        1. Is this a new atomic primitive (8th atom: Policy/Access)?
           Or a new aggregate (PolicySurface / AccessSurface)?
        2. Granularity: field level or surface level (entire config_surface)?
        3. DN wildcard matching needed — define the pattern language
        4. How does it relate to the existing Role atom (config/state/operational)?
      Closing criterion: decision documented in DECISIONS, schema plan exists.
    blocked_by: "compiler-primitive-validation"
    accept: DECISIONS.md contains the decision + schema plan exists

  - task: "policy-surface-schema"
    status: done
    priority: 26
    milestone: policy-surface
    blocked_by: "policy-access-primitive-design"
    prompt: |
      Implement the content-level permission system into the primitive model.
      Based on the decisions from policy-access-primitive-design:
        - If new atomic: schemas/atomic/policy.yaml (or access.yaml)
        - If new aggregate: schemas/aggregate/policy-surface.yaml
      Declarable for every ManagedEntity node:
        - visibility: who_can_read (all | owner | operator | service | none)
        - writability: who_can_write (user | service | adapter | none)
        - condition: optional condition (e.g. only if owner == user)
      Wire into the ManagedEntity aggregate (optional surface).
    accept: make validate

  # ── Phase 7: First signed release ───────────────────────────────────────────

  - task: "signed-release"
    status: done
    priority: 24
    milestone: release
    blocked_by: "compiler-primitive-validation"
    prompt: |
      Create the first signed release artifact.
        make release VERSION=0.1.0
      Prerequisite: Vault Transit key (`cic-my-sign-key`) is available.
      Artifact: written to the release/ directory, with checksum + ECDSA signature.
    accept: ls release/ && make validate
    notes: |
      Tag: primitives/@v0.1.0
      Dockerfile required: git, curl, jq + safe.directory /app
      build_hash = source_hash for now (no actual build env yet)
      yq PATH issue: make release ran with tools/release.sh fallback
